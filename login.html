<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — BloodLink Pro</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
</head>
<body data-page="login">

<nav class="navbar">
  <a href="index.html" class="nav-brand"><span class="drop-icon">🩸</span> BloodLink<span style="color:#1a1a2e;font-weight:400">Pro</span></a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="search.html">Find Donors</a>
    <a href="banks.html">Blood Banks</a>
    <a href="pricing.html">Market</a>
    <a href="about.html">About Us</a>
    <a href="login.html" class="active btn btn-outline btn-sm">Login</a>
    <a href="register.html" class="btn btn-primary btn-sm">Register</a>
  </div>
</nav>

<div class="form-page">
  <div class="form-card">
    <div class="form-header">
      <div class="icon">🩸</div>
      <h2>Welcome Back</h2>
      <p>Sign in to your BloodLink Pro account</p>
    </div>

    <div id="login-error" class="error-msg" style="background:#fef2f2;border:1px solid #fca5a5;padding:10px 14px;border-radius:8px;margin-bottom:1rem;"></div>

    <form id="login-form">
      <div class="form-group">
        <label for="l-email">Email Address</label>
        <input type="email" id="l-email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label for="l-password">Password</label>
        <input type="password" id="l-password" placeholder="Your password" required />
      </div>
      <button type="submit" class="btn btn-primary btn-lg" style="width:100%;justify-content:center;margin-top:0.5rem;">
        Sign In →
      </button>
    </form>

    <div class="form-divider">or</div>

    <div style="text-align:center;">
      <a href="donor.html" class="btn btn-outline" style="width:100%;justify-content:center;">
        🩸 Register as Donor (No Login Needed)
      </a>
    </div>

    <div class="form-footer" style="margin-top:1.2rem;">
      Don't have an account? <a href="register.html">Create one</a>
    </div>

    <!-- Demo hint -->
    <div style="margin-top:1rem;padding:10px 14px;background:#f0f9ff;border-radius:8px;font-size:0.8rem;color:#0369a1;border:1px solid #bae6fd;">
      💡 <strong>Demo:</strong> Register first, then login with your credentials.
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
