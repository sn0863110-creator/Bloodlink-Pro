<body data-page="login">

<nav class="navbar">
  <a href="index.html" class="nav-brand"><span class="drop-icon">🩸</span> BloodLink<span style="color:#1a1a2e;font-weight:400">Pro</span></a>
  <button class="nav-toggle" id="nav-toggle" aria-label="Menu"><span></span><span></span><span></span></button>
  <div class="nav-links" id="nav-links">
    <a href="index.html">Home</a>
    <a href="search.html">Find Donors</a>
    <a href="banks.html">Blood Banks</a>
    <a href="pricing.html">Market</a>
    <a href="about.html">About Us</a>
    <span id="nav-user" style="display:none;font-size:0.85rem;font-weight:600;color:var(--primary);padding:0.4rem 0.8rem;background:var(--bg-soft);border-radius:8px;"></span>
    <a href="dashboard.html" id="nav-dashboard" class="btn btn-ghost btn-sm" style="display:none;">Dashboard</a>
    <a href="login.html" class="active btn btn-outline btn-sm" id="nav-login">Login</a>
    <a href="register.html" class="btn btn-primary btn-sm" id="nav-register">Register</a>
    <button id="nav-logout" class="btn btn-ghost btn-sm" style="display:none;">Logout</button>
  </div>
</nav>

<div class="form-page">
  <div class="form-card">
    <div class="form-header">
      <div class="icon">🩸</div>
      <h2>Welcome Back</h2>
      <p>Sign in to your BloodLink Pro account</p>
    </div>

    <div id="login-error" class="error-msg" style="background:#fef2f2;border:1px solid #fca5a5;padding:10px 14px;border-radius:8px;margin-bottom:1rem;"></div>

    <form id="login-form">
      <div class="form-group">
        <label for="l-email">Email Address</label>
        <input type="email" id="l-email" name="email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label for="l-password">Password</label>
        <input type="password" id="l-password" name="password" placeholder="Your password" required />
      </div>
      <button type="submit" class="btn btn-primary btn-lg" style="width:100%;justify-content:center;margin-top:0.5rem;">
        Sign In →
      </button>
    </form>

    <div class="form-divider">or</div>

    <div style="text-align:center;">
      <a href="donor.html" class="btn btn-outline" style="width:100%;justify-content:center;">
        🩸 Register as Donor (No Login Needed)
      </a>
    </div>

    <div class="form-footer" style="margin-top:1.2rem;">
      Don't have an account? <a href="register.html">Create one</a>
    </div>

  </div>
</div>

<footer class="footer"><p>© 2025 <strong>BloodLink Pro</strong> — Built with ❤️ by <strong style="color:#e63946;">Satish Kumar Nishad · Team HackForce</strong></p></footer>
<script src="script.js"></script>
<script>
// Inline fallback — overrides script.js initLogin with direct ID-based approach
const _AK='$2a$10$gnr12wuvoYipciglW9hglOFE5FfQ9q0yU01ZBv8dwhwaNMfUSU.NW';
const _BU='69bc2150aa77b81da9fcb1e3';
const _BB='https://api.jsonbin.io/v3/b';
async function _jbGet(id){try{const r=await fetch(_BB+'/'+id+'/latest',{headers:{'X-Master-Key':_AK}});if(!r.ok)return null;const d=await r.json();return d.record||null;}catch(e){return null;}}
async function _getUsers(){const cloud=await _jbGet(_BU);if(cloud&&Array.isArray(cloud.users)){localStorage.setItem('blp_uc',JSON.stringify(cloud.users));return cloud.users;}const c=localStorage.getItem('blp_uc');return c?JSON.parse(c):[];}
function _toast(msg,type){let t=document.getElementById('blp-toast');if(!t){t=document.createElement('div');t.id='blp-toast';t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:8px;color:#fff;font-weight:600;z-index:9999;font-size:14px;transition:opacity .4s';document.body.appendChild(t);}t.textContent=msg;t.style.background=type==='success'?'#27ae60':type==='error'?'#e74c3c':'#2980b9';t.style.opacity='1';clearTimeout(t._t);t._t=setTimeout(function(){t.style.opacity='0';},3000);}
// Replace the form listener (remove any from script.js by cloning)
window.addEventListener('DOMContentLoaded', function() {
  const form = document.getElementById('login-form');
  if (!form) return;
  const fresh = form.cloneNode(true);
  form.parentNode.replaceChild(fresh, form);
  fresh.addEventListener('submit', async function(e) {
    e.preventDefault();
    const email = document.getElementById('l-email').value.trim().toLowerCase();
    const pass  = document.getElementById('l-password').value;
    const btn   = fresh.querySelector('button[type=submit]');
    btn.disabled = true; btn.textContent = 'Logging in...';
    const users = await _getUsers();
    const user  = users.find(function(u){ return u.email.toLowerCase() === email; });
    if (!user)              { _toast('Email not found. Please register first.', 'error'); btn.disabled = false; btn.textContent = 'Sign In \u2192'; return; }
    if (user.password !== pass) { _toast('Wrong password.', 'error'); btn.disabled = false; btn.textContent = 'Sign In \u2192'; return; }
    localStorage.setItem('blp_user', JSON.stringify(user));
    _toast('Login successful!', 'success');
    setTimeout(function(){ window.location.href = 'dashboard.html'; }, 800);
  });
});
</script>
</body>
</html>
