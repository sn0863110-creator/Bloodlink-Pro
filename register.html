<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — BloodLink Pro</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
</head>
<body data-page="register">

<nav class="navbar">
  <a href="index.html" class="nav-brand"><span class="drop-icon">🩸</span> BloodLink<span style="color:#1a1a2e;font-weight:400">Pro</span></a>
  <button class="nav-toggle" id="nav-toggle" aria-label="Menu"><span></span><span></span><span></span></button>
  <div class="nav-links" id="nav-links">
    <a href="index.html">Home</a>
    <a href="search.html">Find Donors</a>
    <a href="banks.html">Blood Banks</a>
    <a href="pricing.html">Market</a>
    <a href="about.html">About Us</a>
    <span id="nav-user" style="display:none;font-size:0.85rem;font-weight:600;color:var(--primary);padding:0.4rem 0.8rem;background:var(--bg-soft);border-radius:8px;"></span>
    <a href="dashboard.html" id="nav-dashboard" class="btn btn-ghost btn-sm" style="display:none;">Dashboard</a>
    <a href="login.html" class="btn btn-outline btn-sm" id="nav-login">Login</a>
    <a href="register.html" class="active btn btn-primary btn-sm" id="nav-register">Register</a>
    <button id="nav-logout" class="btn btn-ghost btn-sm" style="display:none;">Logout</button>
  </div>
</nav>

<div class="form-page" style="padding:2rem 1rem;">
  <div class="form-card form-card-wide">
    <div class="form-header">
      <div class="icon">❤️</div>
      <h2>Join BloodLink Pro</h2>
      <p>Create your account and start saving lives</p>
    </div>

    <!-- Role Tabs -->
    <div class="role-tabs">
      <button class="role-tab active" data-role="user">👤 I'm a User</button>
      <button class="role-tab" data-role="donor">🩸 I'm a Donor</button>
    </div>
    <input type="hidden" id="r-role" value="user" />

    <div id="register-error" class="error-msg" style="background:#fef2f2;border:1px solid #fca5a5;padding:10px 14px;border-radius:8px;margin-bottom:1rem;"></div>

    <form id="register-form">
      <div class="form-row">
        <div class="form-group">
          <label for="r-name">Full Name *</label>
          <input type="text" id="r-name" name="name" placeholder="John Doe" required />
        </div>
        <div class="form-group">
          <label for="r-email">Email Address *</label>
          <input type="email" id="r-email" name="email" placeholder="you@example.com" required />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="r-password">Password *</label>
          <input type="password" id="r-password" name="password" placeholder="Min 6 characters" required />
        </div>
        <div class="form-group">
          <label for="r-city">City *</label>
          <input type="text" id="r-city" name="city" placeholder="e.g. Kanpur" required />
        </div>
      </div>

      <!-- Donor-only fields -->
      <div id="donor-extra-fields" style="display:none;">
        <div style="height:1px;background:var(--border);margin:0.5rem 0 1.2rem;"></div>
        <p style="font-size:0.82rem;color:var(--text-muted);margin-bottom:1rem;">🩸 Donor Information</p>
        <div class="form-row">
          <div class="form-group">
            <label for="r-blood">Blood Group *</label>
            <select id="r-blood" name="blood">
              <option value="">Select Blood Group</option>
              <option>A+</option><option>A-</option>
              <option>B+</option><option>B-</option>
              <option>AB+</option><option>AB-</option>
              <option>O+</option><option>O-</option>
            </select>
          </div>
          <div class="form-group">
            <label for="r-contact">Contact Number *</label>
            <input type="tel" id="r-contact" name="phone" placeholder="10-digit mobile" maxlength="10" />
          </div>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-lg" style="width:100%;justify-content:center;margin-top:0.5rem;">
        Create Account →
      </button>
    </form>

    <div class="form-footer">
      Already have an account? <a href="login.html">Sign in</a>
    </div>
  </div>
</div>

<script src="script.js"></script>
<script>
const _AK2='$2a$10$gnr12wuvoYipciglW9hglOFE5FfQ9q0yU01ZBv8dwhwaNMfUSU.NW';
const _BU2='69bc2150aa77b81da9fcb1e3';
const _BD2='69bc22a2b7ec241ddc82de74';
const _BB2='https://api.jsonbin.io/v3/b';
async function _jbGet2(id){try{const r=await fetch(_BB2+'/'+id+'/latest',{headers:{'X-Master-Key':_AK2}});if(!r.ok)return null;const d=await r.json();return d.record||null;}catch(e){return null;}}
async function _jbPut2(id,data){try{const r=await fetch(_BB2+'/'+id,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':_AK2},body:JSON.stringify(data)});return r.ok;}catch(e){return false;}}
async function _getUsers2(){const cloud=await _jbGet2(_BU2);if(cloud&&Array.isArray(cloud.users)){localStorage.setItem('blp_uc',JSON.stringify(cloud.users));return cloud.users;}const c=localStorage.getItem('blp_uc');return c?JSON.parse(c):[];}
function _toast2(msg,type){let t=document.getElementById('blp-toast');if(!t){t=document.createElement('div');t.id='blp-toast';t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:8px;color:#fff;font-weight:600;z-index:9999;font-size:14px;transition:opacity .4s';document.body.appendChild(t);}t.textContent=msg;t.style.background=type==='success'?'#27ae60':type==='error'?'#e74c3c':'#2980b9';t.style.opacity='1';clearTimeout(t._t);t._t=setTimeout(function(){t.style.opacity='0';},3000);}
window.addEventListener('DOMContentLoaded', function() {
  // Role tabs
  document.querySelectorAll('.role-tab').forEach(function(tab){
    tab.addEventListener('click',function(){
      document.querySelectorAll('.role-tab').forEach(function(t){t.classList.remove('active');});
      tab.classList.add('active');
      const role=tab.getAttribute('data-role');
      const ri=document.getElementById('r-role');if(ri)ri.value=role;
      const de=document.getElementById('donor-extra-fields');if(de)de.style.display=role==='donor'?'block':'none';
    });
  });
  // Clone form to remove any duplicate listeners from script.js
  const form = document.getElementById('register-form');
  if (!form) return;
  const fresh = form.cloneNode(true);
  form.parentNode.replaceChild(fresh, form);
  fresh.addEventListener('submit', async function(e) {
    e.preventDefault();
    const name  = document.getElementById('r-name').value.trim();
    const email = document.getElementById('r-email').value.trim().toLowerCase();
    const pass  = document.getElementById('r-password').value;
    const city  = (document.getElementById('r-city')||{value:''}).value.trim();
    const blood = (document.getElementById('r-blood')||{value:''}).value;
    const phone = (document.getElementById('r-contact')||{value:''}).value.trim();
    const role  = (document.getElementById('r-role')||{value:'user'}).value;
    const btn   = fresh.querySelector('button[type=submit]');
    if(!name||!email||!pass){_toast2('Please fill all fields.','error');return;}
    btn.disabled=true;btn.textContent='Registering...';
    const users=await _getUsers2();
    if(users.find(function(u){return u.email.toLowerCase()===email;})){
      _toast2('Email already registered. Please login.','error');
      btn.disabled=false;btn.textContent='Create Account \u2192';return;
    }
    const newUser={id:Date.now(),name:name,email:email,password:pass,blood:blood,city:city,phone:phone,role:role,joined:new Date().toISOString()};
    users.push(newUser);
    if(role==='donor'&&blood&&phone){
      const dc=await _jbGet2(_BD2);
      const donors=(dc&&Array.isArray(dc.donors))?dc.donors:(JSON.parse(localStorage.getItem('blp_dc')||'[]'));
      donors.push({id:Date.now()+1,name:name,blood:blood,city:city,phone:phone,date:new Date().toISOString()});
      await _jbPut2(_BD2,{donors:donors});
      localStorage.setItem('blp_dc',JSON.stringify(donors));
    }
    const ok=await _jbPut2(_BU2,{users:users});
    localStorage.setItem('blp_uc',JSON.stringify(users));
    _toast2(ok?'Registration successful! Please login.':'Registered! Login on this device.',ok?'success':'info');
    setTimeout(function(){window.location.href='login.html';},1200);
  });
});
</script>
</body>
</html>
