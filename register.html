<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — BloodLink Pro</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
</head>
<body data-page="register">

<nav class="navbar">
  <a href="index.html" class="nav-brand"><span class="drop-icon">🩸</span> BloodLink<span style="color:#1a1a2e;font-weight:400">Pro</span></a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="search.html">Find Donors</a>
    <a href="banks.html">Blood Banks</a>
    <a href="pricing.html">Market</a>
    <a href="about.html">About Us</a>
    <a href="login.html" class="btn btn-outline btn-sm">Login</a>
    <a href="register.html" class="active btn btn-primary btn-sm">Register</a>
  </div>
</nav>

<div class="form-page" style="padding:2rem 1rem;">
  <div class="form-card form-card-wide">
    <div class="form-header">
      <div class="icon">❤️</div>
      <h2>Join BloodLink Pro</h2>
      <p>Create your account and start saving lives</p>
    </div>

    <!-- Role Tabs -->
    <div class="role-tabs">
      <button class="role-tab active" data-role="user">👤 I'm a User</button>
      <button class="role-tab" data-role="donor">🩸 I'm a Donor</button>
    </div>
    <input type="hidden" id="r-role" value="user" />

    <div id="register-error" class="error-msg" style="background:#fef2f2;border:1px solid #fca5a5;padding:10px 14px;border-radius:8px;margin-bottom:1rem;"></div>

    <form id="register-form">
      <div class="form-row">
        <div class="form-group">
          <label for="r-name">Full Name *</label>
          <input type="text" id="r-name" placeholder="John Doe" required />
        </div>
        <div class="form-group">
          <label for="r-email">Email Address *</label>
          <input type="email" id="r-email" placeholder="you@example.com" required />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="r-password">Password *</label>
          <input type="password" id="r-password" placeholder="Min 6 characters" required />
        </div>
        <div class="form-group">
          <label for="r-city">City *</label>
          <input type="text" id="r-city" placeholder="e.g. Kanpur" required />
        </div>
      </div>

      <!-- Donor-only fields -->
      <div id="donor-extra-fields" style="display:none;">
        <div style="height:1px;background:var(--border);margin:0.5rem 0 1.2rem;"></div>
        <p style="font-size:0.82rem;color:var(--text-muted);margin-bottom:1rem;">🩸 Donor Information</p>
        <div class="form-row">
          <div class="form-group">
            <label for="r-blood">Blood Group *</label>
            <select id="r-blood">
              <option value="">Select Blood Group</option>
              <option>A+</option><option>A-</option>
              <option>B+</option><option>B-</option>
              <option>AB+</option><option>AB-</option>
              <option>O+</option><option>O-</option>
            </select>
          </div>
          <div class="form-group">
            <label for="r-contact">Contact Number *</label>
            <input type="tel" id="r-contact" placeholder="10-digit mobile" maxlength="10" />
          </div>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-lg" style="width:100%;justify-content:center;margin-top:0.5rem;">
        Create Account →
      </button>
    </form>

    <div class="form-footer">
      Already have an account? <a href="login.html">Sign in</a>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
